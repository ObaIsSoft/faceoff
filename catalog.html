<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | Faceoff</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="scrollable-page">
    <header class="nav-top">
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">home</a></li>
                <li><a href="about.html">about</a></li>
                <li><a href="catalog.html" style="opacity: 1; font-weight: 900;">catalog</a></li>
                <li><a href="compare.html">compare</a></li>
            </ul>
        </nav>
    </header>

    <main class="catalog-container">
        <header class="catalog-header">
            <h1 class="catalog-title">Lineup <br> Selection</h1>
            <span class="catalog-count">[ 04 VEHICLES ]</span>
        </header>

        <div id="catalog-grid" class="catalog-grid"></div>
    </main>

    <script src="js/cars-data.js"></script>
    <script>
        const CATALOG_ORDER = ["mercedes-g-wagon", "lexus-lx-600", "range-rover", "escalade-v"];

        const grid = document.getElementById('catalog-grid');
        grid.innerHTML = CATALOG_ORDER.map(id => {
            const car = CARS[id];
            return `
                <a href="showroom.html?car=${id}" class="catalog-card">
                    <div class="catalog-visual">
                        <img src="${car.img}" alt="${car.name}">
                    </div>
                    <div class="catalog-item-info">
                        <div>
                            <h2 class="catalog-item-name">${car.name}</h2>
                            <p class="catalog-item-meta">${car.meta}</p>
                        </div>
                        <span class="catalog-item-price">${car.price}</span>
                    </div>
                </a>
            `;
        }).join('');

        document.querySelector('.catalog-count').textContent = `[ 0${CATALOG_ORDER.length} VEHICLES ]`;

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = "1";
                    entry.target.style.transform = "translateY(0)";
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.catalog-card').forEach(card => {
            card.style.opacity = "0";
            card.style.transform = "translateY(30px)";
            card.style.transition = "all 0.8s cubic-bezier(0.16, 1, 0.3, 1)";
            observer.observe(card);
        });
    </script>
</body>
</html>
