<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | Faceoff</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="scrollable-page">
    <header class="nav-top" id="persistent-nav">
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">home</a></li>
                <li><a href="about.html">about</a></li>
                <li><a href="catalog.html">catalog</a></li>
                <li><a href="compare.html">compare</a></li>
                <li><a href="contact.html">contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="catalog-container" id="main-content">
        <header class="catalog-header">
            <h1 class="catalog-title">Lineup <br> Selection</h1>
            <span class="catalog-count">[ 00 VEHICLES ]</span>
        </header>

        <div class="catalog-filters">
            <div class="caf-search-wrap">
                <span class="caf-search-icon">⌕</span>
                <input type="text" id="caf-search" class="caf-search" placeholder="Search vehicles…" autocomplete="off">
                <button id="caf-clear" class="caf-clear" aria-label="Clear search">✕</button>
            </div>
            <div class="caf-controls">
                <div class="caf-group">
                    <span class="caf-label">Engine</span>
                    <div class="caf-pills" id="caf-engine">
                        <button class="caf-pill active" data-val="">All</button>
                        <button class="caf-pill" data-val="V6">V6</button>
                        <button class="caf-pill" data-val="V8">V8</button>
                    </div>
                </div>
                <div class="caf-group">
                    <span class="caf-label">Sort by Price</span>
                    <div class="caf-pills" id="caf-sort">
                        <button class="caf-pill active" data-val="">Default</button>
                        <button class="caf-pill" data-val="asc">Low → High</button>
                        <button class="caf-pill" data-val="desc">High → Low</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="catalog-empty" class="catalog-empty" style="display:none;">
            <span>No vehicles match your search.</span>
            <button onclick="CatalogPage.resetFilters()" class="catalog-empty-reset">Clear filters</button>
        </div>

        <div id="catalog-grid" class="catalog-grid"></div>
    </main>

    <!-- Shell Scripts -->
    <script src="js/cars-data.js"></script>
    <script src="js/drawer.js"></script>
    <script src="js/player.js"></script>
    <script src="js/pages/catalog.js"></script>
    <script src="js/pages/compare.js"></script>
    <script src="js/pages/showroom.js"></script>
    <script src="js/pages/contact.js"></script>
    <script src="js/pages/about.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
