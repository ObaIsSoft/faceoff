<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Faceoff - Redefining the automotive experience with minimalist luxury.">
    <title>Faceoff | Automotive Luxury</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <main class="landing-container" id="main-content">
        <h1 class="company-name" id="brand-logo">Faceoff</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="about.html" id="nav-about">about</a></li>
                <li><a href="catalog.html" id="nav-catalog">catalog</a></li>
                <li><a href="showroom.html" id="nav-showroom">showroom</a></li>
                <li><a href="compare.html" id="nav-compare">compare</a></li>
                <li><a href="contact.html" id="nav-contact">contact</a></li>
            </ul>
        </nav>

        <div class="landing-footer">
            <div class="region-label">Operational across: Nigeria, Ghana, Togo, Benin</div>
            <div class="currency-selector" id="currency-switcher">
                <span class="curr-opt active" data-curr="NGN">NGN</span>
                <span class="curr-opt" data-curr="GHS">GHS</span>
                <span class="curr-opt" data-curr="XOF">XOF</span>
                <span class="curr-opt" data-curr="USD">USD</span>
            </div>
        </div>
    </main>
    <script>
        document.querySelectorAll('.curr-opt').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.curr-opt').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                localStorage.setItem('preferred-currency', opt.getAttribute('data-curr'));
            });
        });

        // Init from storage
        const saved = localStorage.getItem('preferred-currency');
        if (saved) {
            const btn = document.querySelector(`.curr-opt[data-curr="${saved}"]`);
            if (btn) btn.click();
        }
    </script>
    </main>
</body>
</html>
