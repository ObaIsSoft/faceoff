<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Faceoff - Redefining the automotive experience with minimalist luxury.">
    <title>Faceoff | Automotive Luxury</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <main class="landing-container" id="main-content">
        <h1 class="company-name" id="brand-logo">Faceoff</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="about.html" id="nav-about">about</a></li>
                <li><a href="catalog.html" id="nav-catalog">catalog</a></li>
                <li><a href="showroom.html" id="nav-showroom">showroom</a></li>
                <li><a href="compare.html" id="nav-compare">compare</a></li>
                <li><a href="contact.html" id="nav-contact">contact</a></li>
            </ul>
        </nav>

        <div class="currency-dock">
            <span class="dock-label">REGION / CURRENCY</span>
            <div class="currency-switcher">
                <button class="currency-btn active" data-cur="NGN">NGN</button>
                <button class="currency-btn" data-cur="GHS">GHS</button>
                <button class="currency-btn" data-cur="XOF-TG">XOF-TG</button>
                <button class="currency-btn" data-cur="XOF-BJ">XOF-BJ</button>
            </div>
        </div>
    </main>

    <script>
        document.querySelectorAll('.currency-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.currency-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // Store preference
                localStorage.setItem('faceoff_currency', btn.dataset.cur);
            });
        });

        // Init from storage
        const saved = localStorage.getItem('faceoff_currency');
        if (saved) {
            const btn = document.querySelector(`[data-cur="${saved}"]`);
            if (btn) {
                document.querySelectorAll('.currency-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        }
    </script>
</body>
</html>
