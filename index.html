<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Faceoff - Redefining the automotive experience with minimalist luxury.">
    <title>Faceoff | Automotive Luxury</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <!-- Persistent Navigation (Initially Hidden on Landing) -->
    <header class="nav-top" id="persistent-nav" style="display: none;">
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">home</a></li>
                <li><a href="about.html">about</a></li>
                <li><a href="catalog.html">catalog</a></li>
                <li><a href="compare.html">compare</a></li>
                <li><a href="contact.html">contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content" class="landing-container">
        <h1 class="company-name" id="brand-logo">Faceoff</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="about.html">about</a></li>
                <li><a href="catalog.html">catalog</a></li>
                <li><a href="showroom.html">showroom</a></li>
                <li><a href="compare.html">compare</a></li>
                <li><a href="contact.html">contact</a></li>
            </ul>
        </nav>

        <div class="currency-dock">
            <span class="dock-label">REGION / CURRENCY</span>
            <div class="currency-switcher">
                <button class="currency-btn active" data-cur="NGN">NGN</button>
                <button class="currency-btn" data-cur="GHS">GHS</button>
                <button class="currency-btn" data-cur="XOF-TG">XOF-TG</button>
                <button class="currency-btn" data-cur="XOF-BJ">XOF-BJ</button>
            </div>
        </div>
    </main>

    <!-- Persistent Global Scripts -->
    <script src="js/cars-data.js"></script>
    <script src="js/drawer.js"></script>
    <script src="js/player.js"></script>
    
    <!-- Page Logic Modules -->
    <script src="js/pages/catalog.js"></script>
    <script src="js/pages/compare.js"></script>
    <script src="js/pages/showroom.js"></script>
    
    <!-- Router (Must be last) -->
    <script src="js/router.js"></script>

    <script>
        // Landing page specific logic (Persistent)
        function initLanding() {
            const nav = document.getElementById('persistent-nav');
            if (nav) nav.style.display = 'none';

            document.querySelectorAll('.currency-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.currency-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    localStorage.setItem('faceoff_currency', btn.dataset.cur);
                    if (window.CatalogPage) window.CatalogPage.renderGrid();
                });
            });

            const saved = localStorage.getItem('faceoff_currency');
            if (saved) {
                const btn = document.querySelector(`[data-cur="${saved}"]`);
                if (btn) {
                    document.querySelectorAll('.currency-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                }
            }
        }

        // Show/Hide Nav based on route
        window.addEventListener('popstate', () => {
            const path = window.location.pathname.split('/').pop() || 'index.html';
            const nav = document.getElementById('persistent-nav');
            if (nav) nav.style.display = (path === 'index.html' || path === '') ? 'none' : 'flex';
        });

        // Intercept landing page clicks
        document.addEventListener('DOMContentLoaded', () => {
            initLanding();
        });
    </script>
</body>
</html>
