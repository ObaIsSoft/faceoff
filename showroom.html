<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom | Faceoff</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="showroom-mode">
    <header class="nav-top" id="persistent-nav">
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">home</a></li>
                <li><a href="about.html">about</a></li>
                <li><a href="catalog.html">catalog</a></li>
                <li><a href="compare.html">compare</a></li>
                <li><a href="contact.html">contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="showroom-stage" id="main-content">
        <div class="flashlight-beam"></div>
        <div class="flashlight-beam right"></div>
        <div class="flashlight-source source-left"></div>
        <div class="flashlight-source source-right"></div>

        <div class="showroom-layout">
            <aside id="specs-left" class="spec-panel spec-panel--left"></aside>

            <div class="showroom-center">
                <div id="car-display" class="showroom-car"></div>
                <h1 id="car-name" class="showroom-title">Vehicle</h1>
                <p id="car-price" class="showroom-price"></p>
                <div class="showroom-cta">
                    <a id="cta-inspection" href="contact.html" class="cta-btn cta-btn--primary">Book Inspection</a>
                    <a id="cta-enquiry" href="contact.html" class="cta-btn cta-btn--ghost">Make Enquiry</a>
                </div>
            </div>

            <aside id="specs-right" class="spec-panel spec-panel--right"></aside>
        </div>
    </main>

    <!-- Shell Scripts -->
    <script src="js/inventory.js"></script>
    <script src="js/cars-data.js"></script>
    <script src="js/drawer.js"></script>
    <script src="js/player.js"></script>
    <script src="js/pages/catalog.js"></script>
    <script src="js/pages/compare.js"></script>
    <script src="js/pages/showroom.js"></script>
    <script src="js/pages/contact.js"></script>
    <script src="js/pages/about.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
