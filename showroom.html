<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom | Faceoff</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="showroom-mode">
    <header class="nav-top">
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">home</a></li>
                <li><a href="about.html">about</a></li>
                <li><a href="catalog.html">catalog</a></li>
                <li><a href="showroom.html">showroom</a></li>
                <li><a href="compare.html">compare</a></li>
                <li><a href="contact.html">contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="showroom-stage">
        <div class="flashlight-beam"></div>
        <div class="flashlight-beam right"></div>
        <div class="flashlight-source source-left"></div>
        <div class="flashlight-source source-right"></div>

        <div class="showroom-layout">
            <aside id="specs-left" class="spec-panel spec-panel--left"></aside>

            <div class="showroom-center">
                <div id="car-display" class="showroom-car"></div>
                <h1 id="car-name" class="showroom-title">Vehicle</h1>
                <p id="car-price" class="showroom-price"></p>
                <div class="showroom-cta">
                    <a id="cta-inspection" href="contact.html" class="cta-btn cta-btn--primary">Book Inspection</a>
                    <a id="cta-enquiry" href="contact.html" class="cta-btn cta-btn--ghost">Make Enquiry</a>
                </div>
            </div>

            <aside id="specs-right" class="spec-panel spec-panel--right"></aside>
        </div>
    </main>

    <script src="js/cars-data.js"></script>
    <script>
        function renderLeftSpecs(car) {
            const d = car.details;
            return `
                <div class="sp-section-label">Identity</div>
                <div class="sp-row"><span class="sp-label">Manufacturer</span><span class="sp-val">${d.manufacturer}</span></div>
                <div class="sp-row"><span class="sp-label">Model Year</span><span class="sp-val">${d.year}</span></div>
                <div class="sp-row"><span class="sp-label">Production</span><span class="sp-val">${d.production}</span></div>
                <div class="sp-row"><span class="sp-label">Edition</span><span class="sp-val">${d.limited}</span></div>
                <div class="sp-divider"></div>
                <div class="sp-section-label">Performance</div>
                <div class="sp-row"><span class="sp-label">0 – 60 mph</span><span class="sp-val">${d.zeroToSixty}</span></div>
                <div class="sp-row"><span class="sp-label">0 – 100 km/h</span><span class="sp-val">${d.zeroToHundred}</span></div>
                <div class="sp-row"><span class="sp-label">Top Speed</span><span class="sp-val">${car.topSpeed}</span></div>
                <div class="sp-row"><span class="sp-label">Power</span><span class="sp-val">${car.power}</span></div>
                <div class="sp-row"><span class="sp-label">Torque</span><span class="sp-val">${car.torque}</span></div>
                <div class="sp-row"><span class="sp-label">Engine</span><span class="sp-val">${d.engineFull}</span></div>
            `;
        }

        function renderRightSpecs(car) {
            const d = car.details;
            return `
                <div class="sp-section-label">Interior</div>
                <div class="sp-row"><span class="sp-label">Seating</span><span class="sp-val">${d.seating}</span></div>
                <div class="sp-row"><span class="sp-label">Cargo</span><span class="sp-val">${d.cargo}</span></div>
                <div class="sp-row"><span class="sp-label">Leather</span><span class="sp-val">${d.leather}</span></div>
                <div class="sp-row"><span class="sp-label">Heated Seats</span><span class="sp-val">${d.heatedSeats}</span></div>
                <div class="sp-row"><span class="sp-label">Audio</span><span class="sp-val">${d.stereo}</span></div>
                <div class="sp-divider"></div>
                <div class="sp-section-label">Technology</div>
                <div class="sp-row"><span class="sp-label">Headlights</span><span class="sp-val">${d.headlights}</span></div>
                <div class="sp-row sp-row--block"><span class="sp-label">AI Systems</span><span class="sp-val">${d.ai}</span></div>
                <div class="sp-divider"></div>
                <div class="sp-section-label">Fun Fact</div>
                <p class="sp-funfact">${d.funFact}</p>
            `;
        }

        function formatPrice(nairaString) {
            const nairaValue = parseInt(nairaString.replace(/[^0-9]/g, ''), 10);
            const currency = localStorage.getItem('faceoff_currency') || 'NGN';
            
            const rates = {
                'NGN': { symbol: '₦', rate: 1 },
                'GHS': { symbol: 'GH₵', rate: 0.012 },
                'XOF-TG': { symbol: 'CFA', rate: 0.52 },
                'XOF-BJ': { symbol: 'CFA', rate: 0.52 }
            };

            const config = rates[currency] || rates['NGN'];
            const converted = nairaValue * config.rate;
            
            return config.symbol + Math.round(converted).toLocaleString();
        }

        function initMobileModals(car) {
            if (window.innerWidth > 768) return;
            const d = car.details;

            const CATEGORIES = [
                {
                    label: 'Identity',
                    rows: [
                        ['Manufacturer', d.manufacturer],
                        ['Year', d.year],
                        ['Production', d.production],
                        ['Edition', d.limited],
                    ]
                },
                {
                    label: 'Performance',
                    rows: [
                        ['0–60 mph', d.zeroToSixty],
                        ['0–100 km/h', d.zeroToHundred],
                        ['Top Speed', car.topSpeed],
                        ['Power', car.power],
                        ['Torque', car.torque],
                        ['Engine', d.engineFull],
                    ]
                },
                {
                    label: 'Interior',
                    rows: [
                        ['Seating', d.seating],
                        ['Cargo', d.cargo],
                        ['Leather', d.leather],
                        ['Heated Seats', d.heatedSeats],
                        ['Audio', d.stereo],
                    ]
                },
                {
                    label: 'Technology',
                    rows: [
                        ['Headlights', d.headlights],
                        ['AI Systems', d.ai],
                    ]
                },
                {
                    label: 'Fun Fact',
                    funfact: d.funFact
                }
            ];

            function buildHTML(cat) {
                if (cat.funfact) {
                    return `<div class="sr-modal-label">${cat.label}</div><p class="sr-modal-funfact">"${cat.funfact}"</p>`;
                }
                const rows = cat.rows.map(([k, v]) =>
                    `<div class="sr-modal-row"><span class="sr-modal-key">${k}</span><span class="sr-modal-val">${v}</span></div>`
                ).join('');
                return `<div class="sr-modal-label">${cat.label}</div><div class="sr-modal-grid">${rows}</div>`;
            }

            const topModal = document.createElement('div');
            topModal.className = 'sr-modal sr-modal--top';
            const botModal = document.createElement('div');
            botModal.className = 'sr-modal sr-modal--bot';
            document.body.appendChild(topModal);
            document.body.appendChild(botModal);

            let idx = 0;

            function update(animate) {
                const topCat = CATEGORIES[idx % CATEGORIES.length];
                const botCat = CATEGORIES[(idx + 1) % CATEGORIES.length];

                if (animate) {
                    topModal.classList.remove('sr-modal--visible');
                    botModal.classList.remove('sr-modal--visible');
                    setTimeout(() => {
                        topModal.innerHTML = buildHTML(topCat);
                        botModal.innerHTML = buildHTML(botCat);
                        topModal.classList.add('sr-modal--visible');
                        botModal.classList.add('sr-modal--visible');
                    }, 350);
                } else {
                    topModal.innerHTML = buildHTML(topCat);
                    botModal.innerHTML = buildHTML(botCat);
                    topModal.classList.add('sr-modal--visible');
                    botModal.classList.add('sr-modal--visible');
                }

                idx = (idx + 1) % CATEGORIES.length;
            }

            update(false);
            setInterval(() => update(true), 4000);
        }

        function initShowroom() {
            const params = new URLSearchParams(window.location.search);
            const carId = params.get('car') || "mercedes-g-wagon";
            const isFlipped = params.get('flipped') === 'true';
            const car = CARS[carId];

            if (!car) {
                document.getElementById('car-name').innerText = "Vehicle not found";
                return;
            }

            document.getElementById('car-name').innerText = car.name;
            document.getElementById('car-price').innerText = formatPrice(car.price);
            document.getElementById('cta-inspection').href = `contact.html?type=inspection&car=${carId}`;
            document.getElementById('cta-enquiry').href   = `contact.html?type=enquiry&car=${carId}`;
            const display = document.getElementById('car-display');
            display.innerHTML = `<img src="${car.img}" style="width:100%; object-fit:contain;">`;
            if (isFlipped) display.classList.add('flipped');

            if (car.details) {
                document.getElementById('specs-left').innerHTML = renderLeftSpecs(car);
                document.getElementById('specs-right').innerHTML = renderRightSpecs(car);
            }

            if (car.details) initMobileModals(car);
        }

        initShowroom();
    </script>
</body>
</html>
