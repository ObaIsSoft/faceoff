<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article | Faceoff</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="stylesheet" href="css/index.css">

    <!-- Preconnect to CDN origins so DNS/TLS are resolved while data scripts execute -->
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <!-- Data + page scripts first — no CDN dep, execute as soon as DOM is ready -->
    <script defer src="js/inventory.js"></script>
    <script defer src="js/cars-data.js"></script>
    <script defer src="js/customization-data.js"></script>
    <script defer src="js/paint-colors.js"></script>
    <script defer src="js/drawer.js"></script>
    <script defer src="js/player.js"></script>
    <script defer src="js/pages/article.js"></script>
    <script defer src="js/transition.js"></script>
    <script defer src="js/cursor.js"></script>

    <!-- Animation libs — downloaded in parallel above, execute after data scripts -->
    <script defer src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- Fire motion setup once GSAP + Lenis are available -->
    <script defer>if (window.ArticlePage) window.ArticlePage._initMotion();</script>
</head>
<body class="article-page scrollable-page">

    <!-- Scroll progress bar -->
    <div class="art-progress" id="art-progress"><div class="art-progress-fill" id="art-progress-fill"></div></div>

    <main class="art-main" id="main-content">
        <article>

            <!-- ① IGNITION HERO ─────────────────────────────────────────── -->
            <section class="art-hero">

                <a id="article-back" href="showroom.html" class="art-back-link">
                    <span class="art-back-arrow">←</span>
                    <span class="art-back-label">Back to Showroom</span>
                </a>

                <div class="art-hero-media">
                    <span class="art-hero-ghost" id="art-hero-ghost"></span>
                    <div class="art-mask-container">
                        <img id="article-image" class="art-parallax-img" src="" alt="Vehicle">
                    </div>
                    <img id="article-brand-logo" class="art-brand-logo" src="" alt="" style="display:none">
                </div>

                <header class="art-hero-header">
                    <div class="ln_"><span id="article-eyebrow" class="art-eyebrow ln"></span></div>
                    <div class="ln_"><h1 id="article-title" class="art-title ln"></h1></div>
                </header>

            </section>

            <!-- ② KINETIC NUMBERS ──────────────────────────────────────── -->
            <section class="art-kinetic" id="art-kinetic">
                <span class="art-kinetic-label">The Numbers</span>
                <div class="art-kinetic-grid">
                    <div class="art-kinetic-item" id="kin-0">
                        <span class="art-kinetic-tag" id="kin-tag-0">0 – 100</span>
                        <span class="art-kinetic-num" id="kin-num-0">—</span>
                        <span class="art-kinetic-bar"></span>
                    </div>
                    <div class="art-kinetic-item" id="kin-1">
                        <span class="art-kinetic-tag" id="kin-tag-1">Power</span>
                        <span class="art-kinetic-num" id="kin-num-1">—</span>
                        <span class="art-kinetic-bar"></span>
                    </div>
                    <div class="art-kinetic-item" id="kin-2">
                        <span class="art-kinetic-tag" id="kin-tag-2">Top Speed</span>
                        <span class="art-kinetic-num" id="kin-num-2">—</span>
                        <span class="art-kinetic-bar"></span>
                    </div>
                </div>
            </section>

            <!-- ③ EDITORIAL BODY ─────────────────────────────────────────── -->
            <section class="art-editorial">
                <div class="art-editorial-grid">
                    <div class="art-editorial-left">
                        <span class="art-section-index">01</span>
                    </div>
                    <div class="art-editorial-right" id="article-body">
                        <!-- Injected by JS -->
                    </div>
                </div>
            </section>

            <!-- ③.5 SPEC DATA ART ────────────────────────────────────────── -->
            <section class="art-specs-data" id="art-specs-data" style="display:none">
                <div class="art-specs-header">
                    <span class="art-specs-label">Specification</span>
                    <span class="art-section-index art-section-index--specs">02</span>
                </div>
                <div class="art-specs-rows" id="art-specs-rows"></div>
            </section>

            <!-- ③.6 VARIANTS & EDITIONS ─────────────────────────────────── -->
            <section class="art-variants" id="art-variants" style="display:none">
                <div class="art-variants-header">
                    <span class="art-variants-label">Editions</span>
                </div>
                <div class="art-variants-grid" id="art-variants-grid"></div>
            </section>

            <!-- ④ ENGINEERING PULL-QUOTE ─────────────────────────────────── -->
            <section class="art-pullquote" id="art-pullquote" style="display:none">
                <div class="art-pullquote-inner">
                    <div class="art-pullquote-rule art-pullquote-rule--top"></div>
                    <div class="ln_"><span class="art-pullquote-tag ln">Behind the Engineering</span></div>
                    <blockquote class="art-pullquote-text" id="art-pullquote-text"></blockquote>
                    <div class="art-pullquote-rule art-pullquote-rule--bot"></div>
                </div>
            </section>

            <!-- ④.5 EDITORIAL SPREAD ─────────────────────────────────────── -->
            <section class="art-spread" id="art-spread">
                <div class="art-spread-primary">
                    <figure class="art-spread-figure">
                        <img id="art-spread-img-0" class="art-spread-img" src="" alt="">
                        <figcaption class="art-spread-caption" id="art-spread-cap-0"></figcaption>
                    </figure>
                </div>
                <div class="art-spread-duo">
                    <figure class="art-spread-figure">
                        <img id="art-spread-img-1" class="art-spread-img" src="" alt="">
                        <figcaption class="art-spread-caption" id="art-spread-cap-1"></figcaption>
                    </figure>
                    <figure class="art-spread-figure">
                        <img id="art-spread-img-2" class="art-spread-img" src="" alt="">
                        <figcaption class="art-spread-caption" id="art-spread-cap-2"></figcaption>
                    </figure>
                </div>
            </section>

            <!-- ④.6 COLOUR PALETTE ───────────────────────────────────────── -->
            <section class="art-palette" id="art-palette" style="display:none">
                <div class="art-palette-header">
                    <span class="art-palette-label">Colour Palette</span>
                    <div class="art-palette-nav">
                        <button class="art-palette-arrow art-palette-arrow--prev" aria-label="Previous colours">&#8592;</button>
                        <button class="art-palette-arrow art-palette-arrow--next" aria-label="Next colours">&#8594;</button>
                    </div>
                </div>
                <div class="art-palette-track-wrap">
                    <div class="art-palette-swatches" id="art-palette-swatches"></div>
                </div>
                <div class="art-palette-finishes" id="art-palette-finishes"></div>
            </section>

            <!-- ⑤ VIDEO SCRUB — TIME MACHINE ─────────────────────────────── -->
            <section class="art-video-scrub">
                <div class="art-sticky-container">
                    <video id="article-video" class="art-scrub-video"
                        muted playsinline preload="auto">
                    </video>
                    <div class="art-video-overlay">
                        <h2 class="art-overlay-title">THE<br>MACHINE</h2>
                        <div class="art-tachometer">
                            <span class="tacho-val">0</span>
                            <span class="tacho-unit">RPM</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ⑥ X-RAY FLASHLIGHT ───────────────────────────────────────── -->
            <section class="art-xray">
                <div class="art-xray-container">
                    <div class="art-xray-bg"><img id="art-xray-bg-img" class="art-xray-bg-img" src="" alt=""></div>
                    <div class="art-xray-reveal" id="xray-spotlight">
                        <video id="article-xray-video" class="art-xray-video"
                            muted playsinline autoplay loop>
                        </video>
                    </div>
                    <div class="art-xray-label">
                        <span class="art-xray-tag">03 — Chassis</span>
                        <h2 class="art-xray-title">CHASSIS<br>INTEGRITY</h2>
                    </div>
                    <p class="art-xray-instruction">Move cursor to explore</p>
                </div>
            </section>

            <!-- ⑥.5 INTERIOR & OPTIONS ──────────────────────────────────── -->
            <section class="art-options" id="art-options" style="display:none">
                <div class="art-options-header">
                    <span class="art-options-label">Interior & Options</span>
                </div>
                <div class="art-opt-tabs" id="art-opt-tabs">
                    <div class="art-opt-indicator" id="art-opt-indicator"></div>
                </div>
                <div class="art-options-body" id="art-options-body"></div>
            </section>

            <!-- ⑦ HORIZONTAL TIMELINE ───────────────────────────────────── -->
            <section class="art-horizontal-section" id="horizontal-trigger">
                <div class="art-horizontal-sticky">
                    <div class="art-h-section-label">04 — Gallery</div>
                    <div class="art-horizontal-track" id="art-h-track">
                        <!-- Items injected by JS from unit gallery -->
                    </div>
                </div>
            </section>

            <!-- ⑧ OUTRO ─────────────────────────────────────────────────── -->
            <section class="art-outro">
                <div class="art-outro-inner">
                    <div class="ln_"><span class="art-outro-label ln">End of line</span></div>
                    <a id="art-outro-back" href="showroom.html" class="art-outro-cta">
                        Return to Showroom <span class="art-outro-arrow">→</span>
                    </a>
                </div>
            </section>

        </article>
    </main>

</body>
</html>
