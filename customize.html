<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customise | Faceoff</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="stylesheet" href="css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
      "imports": {
        "three": "./assets/three/three.module.js",
        "three/addons/": "./assets/three/addons/"
      }
    }
    </script>
</head>
<body class="customize-mode">
    <header class="nav-top" id="persistent-nav">
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">home</a></li>
                <li><a href="about.html">about</a></li>
                <li><a href="catalog.html">catalog</a></li>
                <li><a href="compare.html">compare</a></li>
                <li><a href="contact.html">contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="customize-stage" id="main-content">
        <div class="customize-layout">

            <!-- Three.js viewport -->
            <div class="customize-viewport">
                <div class="cz-top-bar">
                    <button id="cz-back" class="cz-back-btn">&#8592; Back</button>
                    <span id="cz-car-name" class="cz-car-title"></span>
                    <span class="cz-hint-inline">Drag to rotate &middot; Scroll to zoom</span>
                </div>
                <div class="cz-canvas-wrap">
                    <div class="cz-loader" id="cz-loader">
                        <svg class="cz-loader-svg" id="cz-loader-svg"
                             viewBox="0 0 540 88" preserveAspectRatio="xMidYMid meet"
                             xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <clipPath id="czLiquidClip">
                                    <path id="cz-wave-path" d="M0 88 L0 88 L540 88 L540 88 Z"/>
                                </clipPath>
                                <linearGradient id="czGoldGrad" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0%"   stop-color="#f5d06e"/>
                                    <stop offset="50%"  stop-color="#c8920c"/>
                                    <stop offset="100%" stop-color="#8a5e06"/>
                                </linearGradient>
                            </defs>
                            <!-- Gray base -->
                            <text class="cz-svg-bg" x="270" y="68" text-anchor="middle">FACEOFF 3D</text>
                            <!-- Gold liquid fill -->
                            <text class="cz-svg-fill" x="270" y="68" text-anchor="middle"
                                  clip-path="url(#czLiquidClip)">FACEOFF 3D</text>
                        </svg>
                        <span class="cz-loader-pct" id="cz-loader-pct">0%</span>
                    </div>
                    <canvas id="cz-canvas"></canvas>
                </div>
            </div>

            <!-- Config panel -->
            <aside class="customize-panel">
                <div class="cz-panel-header">
                    <div class="cz-panel-header-top">
                        <div>
                            <p class="cz-panel-eyebrow">Vehicle</p>
                            <h2 class="cz-panel-title">Configure</h2>
                        </div>
                        <button id="cz-panel-back" class="cz-panel-back-btn">&#8592; Showroom</button>
                    </div>
                </div>

                <nav class="cz-steps" id="cz-steps">
                    <button class="cz-step active" data-step="0">
                        <span class="cz-step-num">1</span>
                        <span class="cz-step-label">Exterior</span>
                    </button>
                    <button class="cz-step" data-step="1">
                        <span class="cz-step-num">2</span>
                        <span class="cz-step-label">Interior</span>
                    </button>
                    <button class="cz-step" data-step="2">
                        <span class="cz-step-num">3</span>
                        <span class="cz-step-label">Add-ons</span>
                    </button>
                    <button class="cz-step" data-step="3">
                        <span class="cz-step-num">4</span>
                        <span class="cz-step-label">Summary</span>
                    </button>
                </nav>

                <div class="cz-step-content" id="cz-step-content"></div>

                <div class="cz-panel-footer">
                    <button id="cz-reset" class="cz-btn cz-btn--ghost cz-reset-btn">Reset</button>
                    <div class="cz-footer-nav">
                        <button id="cz-prev" class="cz-btn cz-btn--ghost cz-prev-btn">&#8592;</button>
                        <button id="cz-next" class="cz-btn cz-btn--primary">Next &#8594;</button>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script src="js/inventory.js"></script>
    <script src="js/cars-data.js"></script>
    <script type="module" src="js/pages/customize.js"></script>
</body>
</html>
