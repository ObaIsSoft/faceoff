<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare | Faceoff</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <header class="nav-top" id="persistent-nav">
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">home</a></li>
                <li><a href="about.html">about</a></li>
                <li><a href="catalog.html">catalog</a></li>
                <li><a href="compare.html">compare</a></li>
                <li><a href="contact.html">contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="compare-wrapper" id="main-content">
        <section class="faceoff-zone">
            <div class="faceoff-col">
                <div class="stack-filter">
                    <div class="sf-group">
                        <span class="sf-label">VEHICLE TYPE</span>
                        <div class="sf-control">
                            <select class="sf-select"><option>ALL</option><option>SUV</option><option>SEDAN</option><option>TRUCK</option></select>
                            <span class="sf-chevron">∨</span>
                        </div>
                    </div>
                    <div class="sf-group">
                        <span class="sf-label">CATEGORY</span>
                        <div class="sf-control">
                            <select class="sf-select"><option>ALL</option><option>LUXURY</option><option>SPORT</option><option>OFF-ROAD</option><option>ADVENTURE</option><option>FAMILY</option><option>ECONOMY</option></select>
                            <span class="sf-chevron">∨</span>
                        </div>
                    </div>
                    <div class="sf-group">
                        <span class="sf-label">BRAND</span>
                        <div class="sf-control"><input type="text" class="sf-input" placeholder="SEARCH BRAND..."></div>
                    </div>
                    <div class="sf-group">
                        <span class="sf-label">MAX MILEAGE</span>
                        <div class="sf-control">
                            <select class="sf-select"><option>ANY</option><option>100</option><option>1,000</option><option>5,000</option><option>20,000</option></select>
                            <span class="sf-chevron">∨</span>
                        </div>
                    </div>
                    <div class="sf-group">
                        <span class="sf-label">PRICE RANGE</span>
                        <div class="sf-control"><input type="range" class="sf-range" min="100000" max="1000000000" value="1000000000" step="100000"></div>
                        <div class="sf-range-bounds">
                            <span class="min-bound">₦100K</span>
                            <input type="text" class="sf-range-val sf-price-input" value="₦1B">
                            <span class="max-bound">₦1B</span>
                        </div>
                    </div>
                    <div class="sf-group">
                        <span class="sf-label">ENERGY</span>
                        <div class="sf-control">
                            <select class="sf-select"><option>ALL</option><option>PETROL</option><option>HYBRID</option><option>ELECTRIC</option></select>
                            <span class="sf-chevron">∨</span>
                        </div>
                    </div>
                </div>
                <div id="left-stack" class="car-stack"></div>
            </div>

            <div class="vs-divider">VS</div>

            <div class="faceoff-col">
                <div class="stack-filter">
                    <div class="sf-group">
                        <span class="sf-label">VEHICLE TYPE</span>
                        <div class="sf-control">
                            <select class="sf-select"><option>ALL</option><option>SUV</option><option>SEDAN</option><option>TRUCK</option></select>
                            <span class="sf-chevron">∨</span>
                        </div>
                    </div>
                    <div class="sf-group">
                        <span class="sf-label">CATEGORY</span>
                        <div class="sf-control">
                            <select class="sf-select"><option>ALL</option><option>LUXURY</option><option>SPORT</option><option>OFF-ROAD</option><option>ADVENTURE</option><option>FAMILY</option><option>ECONOMY</option></select>
                            <span class="sf-chevron">∨</span>
                        </div>
                    </div>
                    <div class="sf-group">
                        <span class="sf-label">BRAND</span>
                        <div class="sf-control"><input type="text" class="sf-input" placeholder="SEARCH BRAND..."></div>
                    </div>
                    <div class="sf-group">
                        <span class="sf-label">MAX MILEAGE</span>
                        <div class="sf-control">
                            <select class="sf-select"><option>ANY</option><option>100</option><option>1,000</option><option>5,000</option><option>20,000</option></select>
                            <span class="sf-chevron">∨</span>
                        </div>
                    </div>
                    <div class="sf-group">
                        <span class="sf-label">PRICE RANGE</span>
                        <div class="sf-control"><input type="range" class="sf-range" min="100000" max="1000000000" value="1000000000" step="100000"></div>
                        <div class="sf-range-bounds">
                            <span class="min-bound">₦100K</span>
                            <input type="text" class="sf-range-val sf-price-input" value="₦1B">
                            <span class="max-bound">₦1B</span>
                        </div>
                    </div>
                    <div class="sf-group">
                        <span class="sf-label">ENERGY</span>
                        <div class="sf-control">
                            <select class="sf-select"><option>ALL</option><option>PETROL</option><option>HYBRID</option><option>ELECTRIC</option></select>
                            <span class="sf-chevron">∨</span>
                        </div>
                    </div>
                </div>
                <div id="right-stack" class="car-stack"></div>
            </div>
        </section>
    </main>

    <div id="faceoff-notification" class="faceoff-notification"></div>

    <!-- Shell Scripts -->
    <script src="js/cars-data.js"></script>
    <script src="js/drawer.js"></script>
    <script src="js/player.js"></script>
    <script src="js/pages/catalog.js"></script>
    <script src="js/pages/compare.js"></script>
    <script src="js/pages/showroom.js"></script>
    <script src="js/pages/contact.js"></script>
    <script src="js/pages/about.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
